name: PR/Test Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title
        run: |
          if ! [[ "${{ github.event.pull_request.title }}" =~ ^(feat|fix|docs|chore|test|refactor|ci|build): \[(BST|AVL|RBT)\] .+ ]]; then
            echo "PR title must follow: 'type: [Tree] Description' (e.g., 'feat: [AVL] Add rotation')"
            exit 1
          fi
      - name: Check PR body
        run: |
          if [ -z "${{ github.event.pull_request.body }}" ]; then
            echo "PR must have a description."
            exit 1
          fi
      - name: Check PR labels
        run: |
          required_labels=("BST" "AVL" "RBT" "bug" "documentation" "dependencies")
          missing_labels=()
          for label in "${required_labels[@]}"; do
            if ! echo "${{ github.event.pull_request.labels }}" | grep -q "$label"; then
              missing_labels+=("$label")
            fi
          done
          if [ ${#missing_labels[@]} -gt 0 ]; then
            echo "Add at least one label: ${missing_labels[*]}"
            exit 1
          fi
      - name: Check commit messages
        run: |
          git fetch --depth=2
          commits=$(git log origin/main..HEAD --oneline)
          if [ -z "$commits" ]; then
            echo "No commits found."
            exit 1
          fi
          invalid_commits=$(echo "$commits" | grep -vE '^(feat|fix|docs|chore|test|refactor|ci|build)(\(.*\))?: .+')
          if [ -n "$invalid_commits" ]; then
            echo "Invalid commit messages:"
            echo "$invalid_commits"
            exit 1
          fi
      - name: Check changed files
        run: |
          changed_files=$(git diff --name-only origin/main..HEAD)
          if echo "$changed_files" | grep -qE '\.txt$'; then
            echo "Text files are not allowed."
            exit 1
          fi
      - name: Check PR reviews
        run: |
          required_reviewers=("NikolaiKl" "lev666" "ivanovm-main")
          approved=false
          for reviewer in "${required_reviewers[@]}"; do
            if echo "${{ github.event.pull_request.reviewers }}" | grep -q "$reviewer"; then
              approved=true
              break
            fi
          done
          if [ "$approved" = false ]; then
            echo "At least one review from ${required_reviewers[*]} is required."
            exit 1
          fi



  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        run: ./gradlew test
