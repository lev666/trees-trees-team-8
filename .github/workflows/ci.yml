name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Для доступа к истории коммитов

      # Проверка заголовка PR (исправлено)
      - name: Check PR Title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$TITLE" =~ ^(feat|fix|docs|chore|test|refactor|ci|build):\ \[(BST|AVL|RBT)\] ]]; then
            echo "::error title=Invalid PR Title::Must follow 'type: [Tree] Description' (e.g., 'feat: [AVL] Add rotation')"
            exit 1
          fi

          if [ ${#TITLE} -lt 15 ] || [ ${#TITLE} -gt 72 ]; then
            echo "::error title=Title Length::Must be between 15-72 characters (Current: ${#TITLE})"
            exit 1
          fi

      # Проверка описания (оставить без изменений)
      - name: Check PR Body
        run: |
          if [ -z "${{ github.event.pull_request.body }}" ]; then
            echo "::error title=Missing Description::PR must have a description"
            exit 1
          fi

      # Проверка меток (исправлено)
      - name: Check Labels
        run: |
          sudo apt-get -y install jq  # Установка jq
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | jq -r '.[]')
          REQUIRED=("BST" "AVL" "RBT" "bug" "documentation" "dependencies")
          
          found=false
          for label in "${REQUIRED[@]}"; do
            if echo "$LABELS" | grep -qxF "$label"; then
              found=true
              break
            fi
          done
          
          if [ "$found" = false ]; then
            echo "::error title=Missing Label::Add at least one of: ${REQUIRED[*]}"
            exit 1
          fi

      # Проверка коммитов (исправлено)
      - name: Check Commit Messages
        run: |
          git fetch origin main  # Явное указание основной ветки
          commits=$(git log --pretty=%s origin/main..HEAD)
          
          invalid_commits=""
          while IFS= read -r msg; do
            if [[ ! "$msg" =~ ^(feat|fix|docs|chore|test|refactor|ci|build)(\(.+\))?:\ .+ ]]; then
              invalid_commits+="- $msg"$'\n'
            fi
          done <<< "$commits"
          
          if [ -n "$invalid_commits" ]; then
            echo "::error title=Invalid Commits::Commit messages must follow Conventional Commits:"$'\n'"$invalid_commits"
            exit 1
          fi

      # Проверка файлов (исправлено)
      - name: Check Changed Files
        run: |
          git diff --name-only origin/main..HEAD | grep -q '\.txt$' && {
            echo "::error title=Invalid Files::TXT files are not allowed"
            exit 1
          } || true

      # Проверка ревью (исправлено)
      - name: Check Reviews
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              headers: { 'X-GitHub-Api-Version': '2022-11-28' }
            });

            const required = ["NikolaiKl", "lev666", "ivanovm-main"];
            const latestReviews = reviews.reverse().filter(r => required.includes(r.user.login));
            
            if (!latestReviews.some(r => r.state === "APPROVED")) {
              core.error(`Requires approval from one of: ${required.join(', ')}`);
              core.setFailed('Missing required review');
            }

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        run: ./gradlew test
