name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  mergeable-check:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Run Mergeable
        run: npx mergeable
        with:
          config-file: .github/mergeable.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.head_ref != 'main' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK using alias
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build and run tests
        run: ./gradlew test
