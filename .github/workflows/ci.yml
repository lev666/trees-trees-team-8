name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  mergeable-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and run Mergeable
        run: |
          docker build -t mergeable -<<EOF
          FROM node:20-alpine
          RUN npm install -g @mergeability/mergeable
          WORKDIR /app
          COPY .github/mergeable.yml .
          ENTRYPOINT ["mergeable"]
          EOF
    
          docker run --rm \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            mergeable --config /app/mergeable.yml

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        run: ./gradlew test
