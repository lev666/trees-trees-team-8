name: PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Добавить checkout для работы с git

      # Проверка заголовка PR
      - name: Check PR Title
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          if [[ ! "$TITLE" =~ ^(feat|fix|docs|chore|test|refactor|ci|build):\ \[(BST|AVL|RBT)\]\ ]]; then
            echo "::error title=Invalid PR Title::Must follow 'type: [Tree] Description' (e.g., 'feat: [AVL] Add rotation')"
            exit 1
          fi
          if [ ${#TITLE} -lt 15 ] || [ ${#TITLE} -gt 72 ]; then
            echo "::error title=Title Length::Must be between 15-72 characters"
            exit 1
          fi

      # Проверка описания
      - name: Check PR Body
        run: |
          if [ -z "${{ github.event.pull_request.body }}" ]; then
            echo "::error title=Missing Description::PR must have a description"
            exit 1
          fi

      # Проверка меток (исправленная версия)
      - name: Check Labels
        run: |
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | jq -r '.[]')
          REQUIRED=("BST" "AVL" "RBT" "bug" "documentation" "dependencies")
          
          for label in "${REQUIRED[@]}"; do
            if echo "$LABELS" | grep -qx "$label"; then
              exit 0
            fi
          done
          
          echo "::error title=Missing Label::Add at least one of: BST, AVL, RBT, bug, documentation, dependencies"
          exit 1

      # Проверка коммитов (исправленная версия)
      - name: Check Commit Messages
        run: |
          git fetch origin $GITHUB_BASE_REF  # Используем базовую ветку
          commits=$(git log --pretty=%s origin/$GITHUB_BASE_REF..HEAD)
          
          invalid_commits=""
          while read -r msg; do
            if [[ ! "$msg" =~ ^(feat|fix|docs|chore|test|refactor|ci|build)(\(.+\))?:\ .+ ]]; then
              invalid_commits+="- $msg"$'\n'
            fi
          done <<< "$commits"
          
          if [ -n "$invalid_commits" ]; then
            echo "::error title=Invalid Commits::Commit messages must follow:"$'\n'"$invalid_commits"
            exit 1
          fi

      # Проверка файлов
      - name: Check Changed Files
        run: |
          git diff --name-only origin/$GITHUB_BASE_REF..HEAD | grep -q '\.txt$' && {
            echo "::error title=Invalid Files::TXT files are not allowed"
            exit 1
          }

      # Проверка ревью (исправленная версия)
      - name: Check Reviews
        uses: actions/github-script@v7
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            
            const required = ["NikolaiKl", "lev666", "ivanovm-main"];
            const hasApproval = reviews.some(r => 
              required.includes(r.user.login) && r.state === "APPROVED"
            );
            
            if (!hasApproval) {
              core.error(`Requires approval from one of: ${required.join(', ')}`);
              core.setFailed('Missing required review');
            }

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        run: ./gradlew test
