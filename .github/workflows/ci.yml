name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  mergeable-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Mergeable Docker image
        run: |
          echo "FROM node:20" > Dockerfile
          echo "WORKDIR /app" >> Dockerfile
          echo "RUN npm install -g @mergeability/mergeable" >> Dockerfile
          echo 'ENTRYPOINT ["mergeable"]' >> Dockerfile
          docker build --platform=linux/amd64 -t mergeable .

      - name: Run Mergeable
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/mergeable.yml:/app/mergeable.yml \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            mergeable --config /app/mergeable.yml

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and run tests
        run: ./gradlew test
