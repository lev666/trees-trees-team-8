name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  mergeable-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Mergeable
        run: |
          # Создаем минимальный Dockerfile
          echo "FROM node:20" > Dockerfile
          echo "RUN npm install -g @mergeability/mergeable" >> Dockerfile
          echo 'ENTRYPOINT ["node", "/usr/local/lib/node_modules/@mergeability/mergeable/dist/cli.js"]' >> Dockerfile
          
          # Собираем образ
          docker build --platform=linux/amd64 -t mergeable .

      - name: Run Mergeable
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/mergeable.yml:/app/mergeable.yml \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            mergeable --config /app/mergeable.yml

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        run: ./gradlew test
