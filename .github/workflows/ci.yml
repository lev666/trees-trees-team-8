name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  mergeable-check:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js без кэша
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'  # Правильное значение для отключения проверки lock-файлов

      - name: Run Mergeable в изоляции
        run: |
          mkdir -p /tmp/mergeable
          cd /tmp/mergeable
          npm init -y --silent  # Создаём временный package.json
          npx --yes --prefix /tmp/mergeable mergeable@latest \
            --config $GITHUB_WORKSPACE/.github/mergeable.yml \
            --token ${{ secrets.GITHUB_TOKEN }}
          rm -rf /tmp/mergeable

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and run tests
        run: ./gradlew test
