name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  mergeable-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install specific version of Mergeable
        run: npm install @mergeability/mergeable@3.0.0 --force

      - name: Inspect package structure
        run: ls -la node_modules/@mergeability/mergeable

      - name: Run Mergeable with alternative path
        run: |
          ./node_modules/@mergeability/mergeable/dist/bin/mergeable --config .github/mergeable.yml --token ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and run tests
        run: ./gradlew test
