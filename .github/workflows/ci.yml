name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  mergeable-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Mergeable image
        run: |
          echo "FROM node:20-alpine" > Dockerfile
          echo "RUN npm install -g @mergeability/mergeable" >> Dockerfile
          echo 'ENTRYPOINT ["node", "/usr/local/lib/node_modules/@mergeability/mergeable/src/cli.js"]' >> Dockerfile
          docker build -t mergeable .

      - name: Run Mergeable
        run: |
          docker run --rm \
            -v ${{ github.workspace }}/.github/mergeable.yml:/app/config.yml \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            mergeable --config /app/config.yml

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run tests
        run: ./gradlew test
