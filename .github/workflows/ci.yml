name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  mergeable-check:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js без проверки lock-файлов
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '/dev/null'  # Специальное значение для обхода проверки

      - name: Run Mergeable в изолированном окружении
        run: |
          # Создаем временную директорию
          TEMP_DIR=$(mktemp -d)
          cd $TEMP_DIR
          
          # Устанавливаем mergeable глобально без lock-файла
          npm install --global --no-package-lock mergeable@latest
          
          # Запускаем mergeable с конфигом из основного репозитория
          mergeable --config $GITHUB_WORKSPACE/.github/mergeable.yml --token ${{ secrets.GITHUB_TOKEN }}
          
          # Очищаем временные файлы
          rm -rf $TEMP_DIR

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and run tests
        run: ./gradlew test
