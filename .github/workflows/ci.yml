name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  mergeable-check:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Mergeable
        run: |
          docker run --rm \
            -v $GITHUB_WORKSPACE:/mnt/repo \
            -e GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} \
            -e CONFIG_PATH=/mnt/repo/.github/mergeable.yml \
            ghcr.io/mergeable/mergeable:latest


  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build and run tests
        run: ./gradlew test
