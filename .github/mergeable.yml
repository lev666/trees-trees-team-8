version: 2
mergeable:
  - when: pull_request.*
    validate:
      - do: title
        must_include:
          regex: '^(feat|fix|docs|chore|test|refactor|ci|build): [(BST|AVL|RBT)] .+'
      - do: description
        no_empty:
          enabled: true
      - do: label
        must_include:
          regex: '\b(BST|AVL|RBT|bug|documentation|dependencies)\b'
      - do: commit
        message:
          regex: '^(feat|fix|docs|chore|test|refactor|ci|build)((.*))?: .+'
      - do: approvals
        min:
          count: 1
    block:
      - conflicts: true
      - wip: true
